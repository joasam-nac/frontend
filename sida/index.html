<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Joakims Webbshop</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div>
        <h1>Joakims Webbshop</h1>
        <p>Jag säljer allt viktigt DU behöver!</p>
      </div>

      <div class="cart-menu">
        <button
          id="cart-toggle"
          class="cart-icon-btn"
          aria-label="Öppna kundvagn"
          aria-expanded="false"
          aria-controls="cart-dropdown"
        >
          <svg
            class="cart-icon"
            viewBox="0 0 24 24"
            aria-hidden="true"
          >
            <path
              d="M3 4h2l2.2 9.2a1 1 0 0 0 1 .8h8.7a1 1 0 0 0 1-.7L21 7H7"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <circle cx="10" cy="19" r="1.5" fill="currentColor" />
            <circle cx="17" cy="19" r="1.5" fill="currentColor" />
          </svg>
          <span id="cart-count" class="cart-badge">0</span>
        </button>

        <div id="cart-dropdown" class="cart-dropdown hidden">
          <div class="cart-dropdown-header">
            <h2>Kundvagn</h2>
          </div>

          <div id="cart-items" class="cart-items"></div>

          <div class="cart-dropdown-footer">
            <div class="total-row">
              <span>Totalt</span>
              <strong id="cart-total">0 kr</strong>
            </div>

            <div class="cart-buttons">
              <button id="clear-cart-btn" class="secondary-btn">
                Töm kundvagn
              </button>
              <a id="checkout-link" class="primary-btn" href="checkout.html">
                Till kassan
              </a>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="browse-layout">
      <section class="shop-section">
        <h2>Kategorier</h2>
        <div id="category-list" class="category-list"></div>

        <h2>Produkter</h2>
        <div id="product-list" class="product-list"></div>
      </section>
    </main>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
