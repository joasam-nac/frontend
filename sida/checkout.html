<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Kassa</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div>
        <h1>Kassa</h1>
        <p>Granska din beställning och fyll i dina uppgifter.</p>
      </div>
      <a href="index.html" class="secondary-link">← Tillbaka till shoppen</a>
    </header>

    <main class="checkout-layout">
      <section class="checkout-section">
        <h2>Kundvagn</h2>
        <div id="checkout-cart-items" class="cart-items"></div>

        <div class="total-row checkout-total">
          <span>Totalt</span>
          <strong id="checkout-total">0.00 kr</strong>
        </div>
      </section>

      <section class="checkout-section">
        <h2>Dina uppgifter</h2>

        <form id="checkout-form" class="checkout-form">
          <label>
            Fullständigt namn
            <input type="text" id="name" required />
          </label>

          <label>
            E-post
            <input type="email" id="email" required />
          </label>

          <label>
            Adress
            <input type="text" id="address" required />
          </label>

          <label>
            Stad
            <input type="text" id="city" required />
          </label>

          <label>
            Postnummer
            <input type="text" id="postalCode" required />
          </label>

          <button type="submit" class="primary-btn">Lägg beställning</button>
        </form>

        <div id="message" class="message"></div>
      </section>
    </main>

    <script type="module" src="./js/checkout.js"></script>
  </body>
</html>
